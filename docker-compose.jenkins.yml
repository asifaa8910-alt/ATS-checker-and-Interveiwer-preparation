version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins.Dockerfile
    container_name: jenkins_docker
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_data:
