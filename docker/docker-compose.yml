version: '3.8'

services:
  backend:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
    volumes:
      - backend_uploads:/usr/src/app/uploads
      - sqlite_data:/usr/src/app/database

  frontend:
    build:
      context: ../
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  # PLACEHOLDERS FOR FUTURE EXTENSIONS
